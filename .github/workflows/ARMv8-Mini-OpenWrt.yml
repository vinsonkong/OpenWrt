name: ARMv8 Mini OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: configs/armv8-mini.config
  DIY_SCRIPT: diy-mini.sh
  CLASH_KERNEL: arm64
  CACHE_TOOLCHAIN: true
  FIRMWARE_TAG: ROOTFS_MINI
  OPENWRT_TAG: ARMv8_MINI
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04
    outputs:
      COMMIT_AUTHOR: ${{ steps.clone.outputs.COMMIT_AUTHOR }}
      COMMIT_DATE: ${{ steps.clone.outputs.COMMIT_DATE }}
      COMMIT_MESSAGE: ${{ steps.clone.outputs.COMMIT_MESSAGE }}
      COMMIT_HASH: ${{ steps.clone.outputs.COMMIT_HASH }}
      DEVICE_TARGET: ${{ steps.variable.outputs.DEVICE_TARGET }}
      DEVICE_SUBTARGET: ${{ steps.variable.outputs.DEVICE_SUBTARGET }}
      FILE_DATE: ${{ steps.compile.outputs.FILE_DATE }}
      DATE: ${{ steps.compile.outputs.DATE }}

    steps:
    - name: 🛒 检出代码
      uses: actions/checkout@v4

    - name: 🛠️ 初始化环境
      run: |
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
        sudo apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo apt-get -y update
        sudo apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204) libfuse-dev
        sudo apt-get -y autoremove --purge && sudo apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: 📦 克隆源码
      id: clone
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        echo "COMMIT_AUTHOR<<EOF" >> $GITHUB_OUTPUT && git show -s --date=short --format="作者: %an" >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT
        echo "COMMIT_DATE<<EOF" >> $GITHUB_OUTPUT && git show -s --date=short --format="时间: %ci" >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT
        echo "COMMIT_MESSAGE<<EOF" >> $GITHUB_OUTPUT && git show -s --date=short --format="内容: %s" >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT
        echo "COMMIT_HASH<<EOF" >> $GITHUB_OUTPUT && git show -s --date=short --format="hash: %H" >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

    - name: ⚙️ 配置编译变量
      id: variable
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH && make defconfig > /dev/null 2>&1
        DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '"' '{print $2}')
        DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV && echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_OUTPUT
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV && echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_OUTPUT

    - name: 🗃️ 缓存工具链
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: false
        mixkey: ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: 📥 更新 Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a

    - name: 🛠️ 加载自定义配置 (DIY)
      run: |
        [ -e files ] && mv files $OPENWRT_PATH/files
        cd $OPENWRT_PATH
        if [ -e $GITHUB_WORKSPACE/$DIY_SCRIPT ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
          bash $GITHUB_WORKSPACE/$DIY_SCRIPT || echo "⚠️ DIY脚本部分命令执行失败"
        fi
        [ -e $GITHUB_WORKSPACE/scripts/preset-clash-core.sh ] && bash $GITHUB_WORKSPACE/scripts/preset-clash-core.sh $CLASH_KERNEL
        [ -e $GITHUB_WORKSPACE/scripts/preset-terminal-tools.sh ] && bash $GITHUB_WORKSPACE/scripts/preset-terminal-tools.sh

    - name: 📥 安装 Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds install -a

    - name: 📥 下载源码包
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 🏗️ 编译固件
      id: compile
      run: |
        cd $OPENWRT_PATH
        mkdir -p files/etc/uci-defaults
        echo -e "#!/bin/sh\nuci set system.@system[0].hostname='OpenWrt-Mini'\nuci commit system" > files/etc/uci-defaults/99-init-settings
        chmod +x files/etc/uci-defaults/99-init-settings
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_OUTPUT

    - name: 📂 整理文件
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        cp $OPENWRT_PATH/.config build.config
        
        # 打包 ipk 库
        mkdir -p packages && cp -r $OPENWRT_PATH/bin/packages/*/*/*.ipk packages/ 2>/dev/null || true
        tar -zcf Packages.tar.gz packages --remove-files 2>/dev/null || true
        
        # 清理不需要的文件
        rm -rf feeds.buildinfo version.buildinfo packages
        
        # ✅ 关键修复：删除所有子目录（如 u-boot-qemu_armv7），防止 Release 上传目录报错
        find . -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
        
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: 📤 上传 Rootfs
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-rootfs
        path: ${{ env.FIRMWARE_PATH }}/*rootfs.tar.gz

    - name: 🚀 发布临时固件
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: R${{ steps.compile.outputs.DATE }} for ${{ env.FIRMWARE_TAG }}
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        # 因为上面已经删除了子目录，这里用 * 只会匹配到文件，不会再报错
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **ARMv8 Mini Firmware (Temporary)**
          - 💻 平台: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
          - ⚽ 源码: ${{ env.REPO_URL }} (${{ env.REPO_BRANCH }})
          - 🌐 IP: 192.168.1.1 | 🔑 密码: password
          ### 🧊 版本信息
          ${{ steps.clone.outputs.COMMIT_AUTHOR }}
          ${{ steps.clone.outputs.COMMIT_DATE }}
          ${{ steps.clone.outputs.COMMIT_MESSAGE }}
          ${{ steps.clone.outputs.COMMIT_HASH }}

  Package:
    needs: Build
    runs-on: ubuntu-22.04
    steps:
    - name: 🛒 检出代码
      uses: actions/checkout@v4

    - name: 📥 下载 Rootfs
      uses: actions/download-artifact@v4
      with:
        name: openwrt-rootfs
        path: openwrt/bin/targets/armvirt/64

    - name: 📦 打包 OpenWrt
      uses: ophub/flippy-openwrt-actions@main
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/armvirt/64/*rootfs.tar.gz
        PACKAGE_SOC: all
        WHOAMI: Haiibo
        KERNEL_VERSION_NAME: 5.15.13_6.1.5
        KERNEL_AUTO_LATEST: true
        DISTRIB_REVISION: R${{ needs.Build.outputs.FILE_DATE }} by Haiibo

    - name: 🚀 发布增强版固件
      uses: ncipollo/release-action@v1
      with:
        name: R${{ needs.Build.outputs.DATE }} for ${{ env.OPENWRT_TAG }}
        tag: ${{ env.OPENWRT_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        removeArtifacts: true
        artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
        body: |
          **OpenWrt ARMv8 Enhanced**
          - 💻 平台: ${{ needs.Build.outputs.DEVICE_TARGET }}-${{ needs.Build.outputs.DEVICE_SUBTARGET }}
          - 🌐 IP: 192.168.1.1 | 🔑 密码: password
          ### 🍻 安装更新
          - 插件: 晶晨宝盒 → 安装/更新 OpenWrt
          - 命令: `openwrt-install-amlogic` / `openwrt-update-amlogic`
          ### 🧊 版本信息
          ${{ needs.Build.outputs.COMMIT_AUTHOR }}
          ${{ needs.Build.outputs.COMMIT_DATE }}
          ${{ needs.Build.outputs.COMMIT_MESSAGE }}
          ${{ needs.Build.outputs.COMMIT_HASH }}
